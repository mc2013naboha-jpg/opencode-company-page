<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>О компании</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        background: #f6f3ee;
        color: #1f2933;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(92vw, 760px);
        padding: 56px 32px;
        border-radius: 28px;
        background: #ffffff;
        box-shadow: 0 24px 80px rgba(31, 41, 51, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(36px, 8vw, 72px);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Я готов к работе, Аня</h1>
    </main>
  </body>
</html>
